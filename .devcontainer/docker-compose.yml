version: '3.8'
services:
  # PHP Backend
  app:
    build:
      context: .
      dockerfile: php.Dockerfile
    volumes:
      - ..:/workspaces:cached
    environment:
      - DB_HOST=db
      - DOCKER_HOST=tcp://docker:2375
      - DOCKER_TLS_CERTDIR=
    depends_on:
      - db
      - docker

  # MySQL Database
  db:
    image: mysql:8.0
    restart: always
    environment:
      - MYSQL_ROOT_PASSWORD=rootpassword
      - MYSQL_DATABASE=mydatabase
      - MYSQL_USER=user
      - MYSQL_PASSWORD=pass
    ports:
      - "3306:3306"

  # React Frontend (Node.js)
  frontend:
    image: node:18-bullseye
    volumes:
      - ..:/workspaces:cached
    command: /bin/sh -c "while sleep 1000; do :; done" # Keeps container alive

  # Docker-in-Docker daemon
  docker:
    image: docker:24-dind
    privileged: true
    command: ["dockerd-entrypoint.sh", "--host=tcp://0.0.0.0:2375", "--host=unix:///var/run/docker.sock"]
    volumes:
      - docker-data:/var/lib/docker

volumes:
  docker-data:
